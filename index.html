<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mưa Sao Băng Nguyên Bản Sáng Đầu Nhạt Đuôi</title>
    <!-- ĐÃ SỬA CHUẨN: Nhúng font chữ Montserrat từ Google Fonts không còn bị treo trang -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Montserrat:ital,wght@1,500&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #020206; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        /* Khung chứa bài thơ dịu dàng */
        .container { 
            text-align: center; 
            width: 85%; 
            max-width: 600px; 
            z-index: 10; 
            pointer-events: none; 
            font-family: 'Montserrat', sans-serif;
            font-style: italic; /* Chữ nghiêng dịu dàng */
        }
        
        .word {
            display: inline-block; margin: 0 6px; opacity: 0;
            transform: scale(0.6) translateY(12px);
            animation: appear 0.8s forwards, dance 4s infinite ease-in-out;
            color: #ffffff; 
            font-size: 23px; 
            font-weight: 500; 
            line-height: 2.2;
        }
        
        @keyframes appear { to { opacity: 1; transform: scale(1) translateY(0); } }
        
        @keyframes dance {
            0%, 100% { transform: translateY(0); text-shadow: 0 0 15px #ff007f, 0 0 30px #ff007f; }
            50% { transform: translateY(-5px); text-shadow: 0 0 25px #00ffff, 0 0 40px #00ffff; color: #fffdfa; }
        }
        .line-break { display: block; height: 18px; }
    </style>
</head>
<body>
    <canvas id="sky"></canvas>
    <div class="container" id="text-box"></div>
    <script>
        // Bài thơ viết hoa chữ đầu câu
        const text = `Hoàng cung lộng lẫy cần chi,
Kiên cường vương miện trên mi rạng ngời.
Xót nhìn đau đớn rã rời,
Phía sau có bóng một người dõi theo.`;

        const box = document.getElementById('text-box');
        let count = 0;
        text.split('\n').forEach((line, idx) => {
            line.split(' ').forEach(w => {
                const s = document.createElement('span'); s.className = 'word'; s.innerText = w;
                s.style.animationDelay = `${count * 0.45}s, ${count * 0.45 + 0.8}s`; 
                box.appendChild(s); count++;
            });
            if(idx < 3) { const br = document.createElement('span'); br.className = 'line-break'; box.appendChild(br); }
        });

        const canvas = document.getElementById('sky'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        const meteors = []; 
        const maxMeteors = 6; // Số lượng thưa thớt rải đều lãng mạn

        class Meteor {
            constructor(init = false) { 
                this.init = init;
                this.reset(); 
            }
            reset() {
                // Thuật toán rải đều tọa độ ngẫu nhiên khắp màn hình
                if (this.init) {
                    this.x = Math.random() * canvas.width * 1.5;
                    this.y = Math.random() * canvas.height - (canvas.height * 0.2);
                    this.init = false; 
                } else {
                    this.x = Math.random() * canvas.width * 1.5; 
                    this.y = Math.random() * -canvas.height * 0.3;
                }
                
                this.length = Math.random() * 30 + 25; // Độ dài vệt sao băng vừa vặn tự nhiên
                this.speed = Math.random() * 0.5 + 0.8; // Tốc độ lướt siêu chậm, nhẹ nhàng
                this.alpha = Math.random() * 0.4 + 0.5;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // Đảo ngược hướng dải màu để đầu sao băng sáng rực và đuôi nhạt dần
                let grad = ctx.createLinearGradient(this.x, this.y, this.x - this.length, this.y + this.length);
                grad.addColorStop(0, 'rgba(255, 255, 255, 1)');       // ĐẦU SAO BĂNG: Sáng trắng rực rỡ nhất
                grad.addColorStop(0.2, 'rgba(220, 255, 255, 0.7)');   // THÂN SAO BĂNG: Nhạt dần ánh xanh dịu
                grad.addColorStop(1, 'rgba(255, 255, 255, 0)');       // ĐUÔI SAO BĂNG: Tan biến hoàn toàn
                
                ctx.strokeStyle = grad; 
                ctx.lineWidth = 0.5; // Nét siêu mảnh thanh lịch
                
                ctx.beginPath(); 
                ctx.moveTo(this.x, this.y); 
                ctx.lineTo(this.x - this.length, this.y + this.length); 
                ctx.stroke(); 
                ctx.restore();
            }
            update() { 
                this.x -= this.speed; 
                this.y += this.speed; 
                if (this.y > canvas.height || this.x < -this.length) { this.reset(); } 
            }
        }
        
        // Khởi tạo hệ thống sao băng rải đều ngay từ đầu
        for (let i = 0; i < maxMeteors; i++) { meteors.push(new Meteor(true)); }
        
        function animate() { 
            // Giữ hiệu ứng lưu vệt chuyển động mượt mà nguyên bản
            ctx.fillStyle = 'rgba(2, 2, 6, 0.22)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height); 
            
            meteors.forEach(m => { 
                m.update(); 
                m.draw(); 
            }); 
            
            requestAnimationFrame(animate); 
        }
        animate();
    </script>
</body>
</html>
